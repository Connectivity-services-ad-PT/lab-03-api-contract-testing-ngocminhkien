name: Contract and Newman Tests (Analytics B5)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint OpenAPI contracts
        run: npx @stoplight/spectral-cli lint contracts/*.yaml --fail-severity error

      - name: Run Mock Servers and Execute Newman Tests
        run: |
          
          npx prism mock contracts/analytics.openapi.yaml -p 4010 --host 0.0.0.0 &
          npx prism mock contracts/iot-ingestion.openapi.yaml -p 4011 --host 0.0.0.0 &
          npx prism mock contracts/ai-vision.openapi.yaml -p 4012 --host 0.0.0.0 &
          
          
          echo "Waiting for all mock servers to wake up via GET requests..."
          npx wait-on http-get://localhost:4010/health http-get://localhost:4011/health http-get://localhost:4012/health --timeout 45000
          
          
          echo "All systems green! Running Newman integration tests..."
          npm run test:mock