name: Contract and Newman Tests (Analytics B5)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint OpenAPI contracts
        run: npx @stoplight/spectral-cli lint contracts/*.yaml --fail-severity error

      - name: Start All Prism mock servers directly
        run: |
          npx prism mock contracts/analytics.openapi.yaml -p 4010 --host 0.0.0.0 &
          npx prism mock contracts/iot-ingestion.openapi.yaml -p 4011 --host 0.0.0.0 &
          npx prism mock contracts/ai-vision.openapi.yaml -p 4012 --host 0.0.0.0 &

      - name: Wait for all mock servers to be ready
        run: |
          npx wait-on http://localhost:4010/health --timeout 30000
          npx wait-on http://localhost:4011/health --timeout 30000
          npx wait-on http://localhost:4012/health --timeout 30000

      - name: Run Newman on mock environment
        run: npm run test:mock

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/